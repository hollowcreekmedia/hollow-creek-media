<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 50" fill="none">
  <!-- Diamond mark -->
  <polygon points="24,3 43,25 24,47 5,25" stroke="#c4973e" stroke-width="1.5" fill="none"/>
  <!-- HC monogram inside diamond -->
  <text x="24" y="31" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16" font-style="italic" fill="#1e1408">HC</text>
  <!-- Thin vertical divider -->
  <line x1="60" y1="10" x2="60" y2="40" stroke="#c4973e" stroke-width="0.8" opacity="0.5"/>
  <!-- HOLLOW CREEK -->
  <text x="72" y="28"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="15" fill="#1e1408" letter-spacing="2.5">HOLLOW CREEK</text>
  <!-- MEDIA subtext -->
  <text x="73" y="41"
    font-family="Arial, Helvetica, sans-serif"
    font-size="7" fill="#7a6e58" letter-spacing="6">MEDIA</text>
</svg>
