<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Message received — Hollow Creek Media will be in touch within 24 hours to discuss your project.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Thank You — Hollow Creek Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bark: #1e1408; 
            --moss: #3a5438; 
            --gold: #c4973e; 
            --cream: #f5f0e6; 
            --warm: #faf7f0; 
            --muted: #7a6e58; 
        }

        body { 
            font-family: 'Jost', sans-serif; 
            background: var(--warm); 
            height: 100vh; 
            margin: 0;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            overflow: hidden;
        }

        /* Subtle background texture or shape */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            border: 1px solid rgba(196, 151, 62, 0.1);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            z-index: 0;
        }

        .container { 
            position: relative;
            z-index: 1;
            padding: 40px;
            max-width: 500px;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            color: var(--gold);
            font-size: 24px;
            margin-bottom: 20px;
            display: block;
        }

        h1 { 
            font-family: 'Cormorant Garamond', serif; 
            font-size: 56px; 
            font-weight: 300; 
            color: var(--bark);
            margin: 0;
        }

        h1 em { color: var(--moss); }

        p { 
            color: var(--muted); 
            margin-top: 20px; 
            font-size: 16px;
            font-weight: 300;
            line-height: 1.6;
        }

        .actions {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn { 
            display: inline-block; 
            padding: 14px 35px; 
            background: var(--moss); 
            color: white; 
            text-decoration: none; 
            font-size: 11px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: var(--bark);
            transform: translateY(-2px);
        }

        .secondary-link {
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--muted);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        .secondary-link:hover {
            border-bottom: 1px solid var(--gold);
            color: var(--gold);
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon">✦</span>
        <h1>Thank <em>you.</em></h1>
        <p>Your message has safely reached our desk. We’ll review your details and reach out within 24 hours to discuss your project.</p>
        
        <div class="actions">
            <a href="index.html" class="btn">Return to Site</a>
            <a href="portfolio.html" class="secondary-link">Explore the Portfolio</a>
        </div>
    </div>
</body>
</html>
